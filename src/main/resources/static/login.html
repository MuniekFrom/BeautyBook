<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie | Pracownia Urody Hola</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<header class="navbar">
    <div class="logo">Pracownia Urody Hola</div>

    <nav>
        <a href="/index.html">Strona główna</a>
        <a href="/index.html#services">Oferta</a>
        <a href="/index.html#employees">Specjaliści</a>
        <a href="/register.html" class="nav-button">Rejestracja</a>
    </nav>
</header>

<main class="auth-container">
    <div class="auth-card">
        <p class="subtitle">Pracownia Urody Hola</p>
        <h1>Zaloguj się</h1>
        <p class="auth-text">
            Zaloguj się, aby umówić wizytę, sprawdzić swoje rezerwacje albo zarządzać grafikiem pracowni.
        </p>

        <form id="login-form">
            <div class="form-group">
                <label for="login">Login / email</label>
                <input type="text" id="login" placeholder="np. klientka@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password">Hasło</label>
                <input type="password" id="password" placeholder="Wpisz hasło" required>
            </div>

            <button type="submit" class="btn primary full-width">Zaloguj się</button>

            <p id="error-message" class="error-message"></p>
        </form>

        <p class="auth-footer-text">
            Nie masz konta? <a href="/register.html">Zarejestruj się</a>
        </p>
    </div>
</main>

<script src="/js/login.js"></script>
</body>
</html>
